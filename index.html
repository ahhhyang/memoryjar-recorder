<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Web Record Audio — WAV</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, sans-serif; max-width: 560px; margin: 2rem auto; padding: 0 1rem; }
  h1 { font-size: 1.25rem; }
  .row { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; margin: 1rem 0; }
  button { padding: .6rem 1rem; font-size: 1rem; cursor: pointer; }
  button[disabled] { opacity: .5; cursor: not-allowed; }
  #status { font-variant-numeric: tabular-nums; color: #666; }
  #level { width: 100%; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
  #level > span { display: block; height: 100%; width: 0%; background: #4ade80; transition: width .05s linear; }
  audio { width: 100%; }
  .meta { font-size: .85rem; color: #666; }
</style>
</head>
<body>
  <h1>Web Record Audio (WAV)</h1>

  <div class="row">
    <button id="record">● Record</button>
    <button id="stop" disabled>■ Stop</button>
    <span id="status">idle</span>
  </div>

  <div id="level"><span></span></div>

  <div class="row">
    <audio id="preview" controls></audio>
  </div>

  <div class="row">
    <a id="download" hidden download="recording.wav">Download WAV</a>
    <span id="meta" class="meta"></span>
  </div>

<script>
const ui = {
  record: document.getElementById('record'),
  stop: document.getElementById('stop'),
  status: document.getElementById('status'),
  level: document.querySelector('#level > span'),
  preview: document.getElementById('preview'),
  download: document.getElementById('download'),
  meta: document.getElementById('meta'),
};

const MAX_SECONDS = 60;
const TARGET_RATE = 16000;

let audioCtx, mediaStream, sourceNode, workletNode;
let chunks = [];      // Float32Array chunks of mono PCM
let sampleRate = 0;
let startTs = 0;
let timerId = 0;

// AudioWorklet processor as a Blob URL — keeps everything in one file.
const workletSrc = `
class RecorderProcessor extends AudioWorkletProcessor {
  process(inputs) {
    const input = inputs[0];
    if (input && input[0]) {
      // Mix down to mono if stereo, copy out (port transfer requires a copy).
      const ch0 = input[0];
      const ch1 = input[1];
      const out = new Float32Array(ch0.length);
      if (ch1) {
        for (let i = 0; i < ch0.length; i++) out[i] = (ch0[i] + ch1[i]) * 0.5;
      } else {
        out.set(ch0);
      }
      this.port.postMessage(out, [out.buffer]);
    }
    return true;
  }
}
registerProcessor('recorder-processor', RecorderProcessor);
`;
const workletURL = URL.createObjectURL(new Blob([workletSrc], { type: 'application/javascript' }));

async function startRecording() {
  ui.record.disabled = true;
  ui.status.textContent = 'requesting microphone…';

  mediaStream = await navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation: true, noiseSuppression: true, channelCount: 1 },
  });

  audioCtx = new AudioContext();
  sampleRate = audioCtx.sampleRate;
  await audioCtx.audioWorklet.addModule(workletURL);

  sourceNode = audioCtx.createMediaStreamSource(mediaStream);
  workletNode = new AudioWorkletNode(audioCtx, 'recorder-processor');

  chunks = [];
  workletNode.port.onmessage = (e) => {
    const block = e.data; // Float32Array
    chunks.push(block);
    // Cheap level meter: peak of this block.
    let peak = 0;
    for (let i = 0; i < block.length; i++) {
      const v = Math.abs(block[i]);
      if (v > peak) peak = v;
    }
    ui.level.style.width = Math.min(100, peak * 140) + '%';
  };

  sourceNode.connect(workletNode);
  // Worklet must connect to destination for `process` to keep running in some
  // browsers; route to a muted gain so we don't hear ourselves.
  const sink = audioCtx.createGain();
  sink.gain.value = 0;
  workletNode.connect(sink).connect(audioCtx.destination);

  startTs = performance.now();
  timerId = setInterval(() => {
    const elapsed = (performance.now() - startTs) / 1000;
    const remaining = Math.max(0, MAX_SECONDS - elapsed);
    ui.status.textContent = `recording  ${elapsed.toFixed(1)}s  /  ${MAX_SECONDS}s  (${remaining.toFixed(1)}s left)`;
    if (elapsed >= MAX_SECONDS) {
      ui.status.textContent = `auto-stopped at ${MAX_SECONDS}s limit`;
      stopRecording();
    }
  }, 100);

  ui.stop.disabled = false;
  ui.status.textContent = `recording  0.0s  /  ${MAX_SECONDS}s`;
}

async function stopRecording() {
  ui.stop.disabled = true;
  clearInterval(timerId);

  workletNode.port.onmessage = null;
  workletNode.disconnect();
  sourceNode.disconnect();
  mediaStream.getTracks().forEach(t => t.stop());
  await audioCtx.close();

  const raw = flatten(chunks);
  const samples = await resampleTo(raw, sampleRate, TARGET_RATE);
  const wav = encodeWAV(samples, TARGET_RATE);
  const blob = new Blob([wav], { type: 'audio/wav' });
  const url = URL.createObjectURL(blob);

  ui.preview.src = url;
  ui.download.href = url;
  ui.download.hidden = false;

  const seconds = samples.length / TARGET_RATE;
  const kb = (blob.size / 1024).toFixed(1);
  ui.meta.textContent = `${seconds.toFixed(2)}s · captured ${sampleRate} Hz → output ${TARGET_RATE} Hz · 16-bit mono · ${kb} KB`;

  ui.status.textContent = 'done';
  ui.record.disabled = false;
  ui.level.style.width = '0%';
}

async function resampleTo(samples, fromRate, toRate) {
  if (fromRate === toRate) return samples;
  const outLength = Math.ceil(samples.length * toRate / fromRate);
  const offline = new OfflineAudioContext(1, outLength, toRate);
  const buf = offline.createBuffer(1, samples.length, fromRate);
  buf.copyToChannel(samples, 0);
  const src = offline.createBufferSource();
  src.buffer = buf;
  src.connect(offline.destination);
  src.start();
  const rendered = await offline.startRendering();
  return rendered.getChannelData(0);
}

function flatten(arrs) {
  let total = 0;
  for (const a of arrs) total += a.length;
  const out = new Float32Array(total);
  let offset = 0;
  for (const a of arrs) { out.set(a, offset); offset += a.length; }
  return out;
}

// PCM16 mono WAV. Header = 44 bytes; see http://soundfile.sapp.org/doc/WaveFormat/
function encodeWAV(samples, sampleRate) {
  const bytesPerSample = 2;
  const numChannels = 1;
  const dataSize = samples.length * bytesPerSample;
  const buffer = new ArrayBuffer(44 + dataSize);
  const view = new DataView(buffer);

  writeStr(view, 0, 'RIFF');
  view.setUint32(4, 36 + dataSize, true);
  writeStr(view, 8, 'WAVE');
  writeStr(view, 12, 'fmt ');
  view.setUint32(16, 16, true);                                  // PCM chunk size
  view.setUint16(20, 1, true);                                   // format = PCM
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * numChannels * bytesPerSample, true); // byte rate
  view.setUint16(32, numChannels * bytesPerSample, true);        // block align
  view.setUint16(34, 16, true);                                  // bits per sample
  writeStr(view, 36, 'data');
  view.setUint32(40, dataSize, true);

  let offset = 44;
  for (let i = 0; i < samples.length; i++, offset += 2) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7fff, true);
  }
  return view;
}

function writeStr(view, offset, s) {
  for (let i = 0; i < s.length; i++) view.setUint8(offset + i, s.charCodeAt(i));
}

ui.record.addEventListener('click', () => {
  startRecording().catch(err => {
    ui.status.textContent = 'error: ' + err.message;
    ui.record.disabled = false;
  });
});
ui.stop.addEventListener('click', stopRecording);
</script>
</body>
</html>
