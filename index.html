<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MemoryJar — Leave a message</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;500;600&family=Varela+Round&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #FAF6F0;
    --paper-deep: #F0E8DC;
    --ink: #2A1F2D;
    --ink-soft: #6B5C66;
    --coral: #E07856;
    --coral-soft: #F2B8A2;
    --gold: #C9A961;
    --gold-soft: #E6D6A8;
    --ring: rgba(224, 120, 86, 0.35);

    --orb-size: clamp(220px, 42vw, 360px);
    --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    --ease-in:  cubic-bezier(0.55, 0, 0.68, 0.27);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Nunito Sans', system-ui, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body {
    min-height: 100dvh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 1.5rem 1.25rem 2rem;
    gap: 1rem;
    background:
      radial-gradient(1200px 600px at 50% -10%, #FFF8EE 0%, var(--paper) 60%),
      var(--paper);
  }

  /* — Top wordmark — */
  header {
    display: flex; align-items: center; justify-content: space-between;
    max-width: 720px; width: 100%; margin: 0 auto;
  }
  .wordmark {
    font-family: 'Varela Round', sans-serif;
    font-size: 1.05rem; letter-spacing: 0.02em;
    color: var(--ink);
  }
  .wordmark .dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 999px;
    background: var(--coral); margin: 0 .5rem .15rem; vertical-align: middle;
  }
  .step {
    font-size: .75rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-soft);
  }

  /* — Stage — */
  main {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 1.5rem; padding: 1rem 0;
  }

  .timer {
    font-family: 'Varela Round', sans-serif;
    font-size: clamp(3.5rem, 14vw, 8rem);
    line-height: 0.9;
    letter-spacing: -0.04em;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
    transition: color .3s var(--ease-out), opacity .3s var(--ease-out);
  }
  .timer .unit {
    font-size: 0.32em; color: var(--ink-soft); letter-spacing: 0.02em; margin-left: .15em;
  }
  body[data-state="idle"] .timer { opacity: 0; height: 0; margin: 0; padding: 0; pointer-events: none; }
  body[data-state="recording"] .timer { color: var(--coral); }
  body[data-state="sealed"] .timer { color: var(--gold); }

  /* — The Jar (orb) — */
  .jar-wrap {
    --level: 0;             /* 0..1, set by JS during recording */
    width: var(--orb-size);
    height: var(--orb-size);
    display: grid; place-items: center;
    position: relative;
  }

  .jar {
    width: 100%; height: 100%;
    border-radius: 999px;
    border: none; padding: 0;
    cursor: pointer;
    background:
      radial-gradient(circle at 35% 30%, #FFFFFF 0%, #FFF4EC 35%, #F2D6C5 75%, #E6BCA9 100%);
    box-shadow:
      inset 0 -18px 40px rgba(160, 90, 60, 0.18),
      inset 0 12px 30px rgba(255, 255, 255, 0.7),
      0 30px 60px -20px rgba(160, 90, 60, 0.35),
      0 0 0 0 var(--ring);
    transition:
      transform .25s var(--ease-out),
      box-shadow .25s var(--ease-out),
      filter .35s var(--ease-out);
    animation: breathe 5s ease-in-out infinite;
  }

  .jar:focus-visible {
    outline: 3px solid var(--coral);
    outline-offset: 8px;
  }

  /* Tap feedback */
  .jar:active { transform: scale(0.97); }

  /* Recording: glow drives off audio level via --level */
  body[data-state="recording"] .jar {
    animation: none;
    background:
      radial-gradient(circle at 35% 30%, #FFFFFF 0%, #FFE4D4 30%, #F2A98C 75%, #E07856 100%);
    box-shadow:
      inset 0 -18px 40px rgba(180, 70, 40, 0.25),
      inset 0 12px 30px rgba(255, 255, 255, 0.55),
      0 30px 60px -15px rgba(224, 120, 86, 0.55),
      0 0 calc(20px + var(--level) * 90px) calc(6px + var(--level) * 30px) var(--ring);
  }

  /* Sealed: gold ring fades in */
  body[data-state="sealed"] .jar {
    animation: none;
    background:
      radial-gradient(circle at 35% 30%, #FFFFFF 0%, #FBF1DC 35%, #E6D2A0 75%, #C9A961 100%);
    box-shadow:
      inset 0 -18px 40px rgba(140, 110, 50, 0.25),
      inset 0 12px 30px rgba(255, 255, 255, 0.55),
      0 30px 60px -15px rgba(201, 169, 97, 0.4),
      0 0 0 6px rgba(201, 169, 97, 0.25),
      0 0 0 12px rgba(201, 169, 97, 0.10);
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1.00); }
    50%      { transform: scale(1.02); }
  }

  /* — Caption — */
  .caption {
    font-family: 'Varela Round', sans-serif;
    font-size: 1.05rem;
    color: var(--ink-soft);
    letter-spacing: 0.01em;
    min-height: 1.5em;
    text-align: center;
    transition: color .3s var(--ease-out);
  }
  body[data-state="recording"] .caption { color: var(--coral); }
  body[data-state="sealed"] .caption { color: var(--gold); }

  /* — Preview tray (only after recording) — */
  .tray {
    width: 100%; max-width: 560px; margin: 0 auto;
    display: grid; gap: .75rem;
    padding: 1rem 1.25rem;
    background: rgba(255, 255, 255, 0.55);
    border: 1px solid rgba(201, 169, 97, 0.25);
    border-radius: 18px;
    backdrop-filter: blur(8px);
    opacity: 0; transform: translateY(8px); pointer-events: none;
    transition: opacity .35s var(--ease-out), transform .35s var(--ease-out);
  }
  body[data-state="sealed"] .tray { opacity: 1; transform: none; pointer-events: auto; }

  .tray-row {
    display: flex; align-items: center; justify-content: space-between; gap: .75rem;
    flex-wrap: wrap;
  }
  audio {
    width: 100%; height: 36px;
    accent-color: var(--coral);
  }
  .meta {
    font-size: .8rem; color: var(--ink-soft); letter-spacing: 0.01em;
    font-variant-numeric: tabular-nums;
  }
  .download {
    font-size: .9rem; color: var(--ink); text-decoration: none;
    padding: .5rem .9rem; border-radius: 999px;
    background: var(--paper-deep);
    transition: background .2s var(--ease-out), transform .2s var(--ease-out);
  }
  .download:hover { background: var(--gold-soft); }
  .download:active { transform: scale(0.97); }

  .reset {
    font-family: 'Nunito Sans', sans-serif;
    background: transparent; border: none;
    color: var(--ink-soft); font-size: .9rem; cursor: pointer;
    padding: .5rem .9rem; border-radius: 999px;
    transition: color .2s var(--ease-out), background .2s var(--ease-out);
  }
  .reset:hover { background: var(--paper-deep); color: var(--ink); }

  .send {
    font-family: 'Varela Round', sans-serif;
    font-size: .95rem; letter-spacing: 0.01em;
    color: #FFF8EE; background: var(--coral);
    border: none; cursor: pointer;
    padding: .65rem 1.15rem; border-radius: 999px;
    box-shadow: 0 8px 18px -8px rgba(224, 120, 86, 0.55);
    transition: transform .2s var(--ease-out), box-shadow .25s var(--ease-out), background .25s var(--ease-out), opacity .2s linear;
  }
  .send:hover { transform: translateY(-1px); box-shadow: 0 12px 22px -8px rgba(224, 120, 86, 0.65); }
  .send:active { transform: scale(0.97); }
  .send[disabled] { opacity: .55; cursor: not-allowed; transform: none; box-shadow: none; }
  body[data-send="sending"] .send { background: var(--ink-soft); }
  body[data-send="sent"] .send { background: var(--gold); box-shadow: 0 8px 18px -8px rgba(201, 169, 97, 0.55); }

  /* — Footer — */
  footer {
    text-align: center; font-size: .75rem; color: var(--ink-soft);
    letter-spacing: 0.04em;
  }

  /* — Error banner — */
  .error {
    display: none;
    max-width: 560px; margin: 0 auto;
    padding: .75rem 1rem; border-radius: 12px;
    background: #FBE9E2; color: #8B3A1C;
    font-size: .9rem;
  }
  body[data-error="true"] .error { display: block; }

  /* — Reduced motion — */
  @media (prefers-reduced-motion: reduce) {
    .jar { animation: none !important; transition: box-shadow .2s linear, background .2s linear !important; }
    .timer, .caption, .tray, .download { transition: opacity .15s linear !important; }
  }

  /* — Smaller phones — */
  @media (max-width: 380px) {
    main { gap: 1rem; }
  }
</style>
</head>
<body data-state="idle">

  <header>
    <div class="wordmark">MemoryJar<span class="dot"></span><span style="color:var(--ink-soft)">recorder</span></div>
    <div class="step">Task A · Web Record</div>
  </header>

  <main>
    <div id="error" class="error"></div>

    <div class="timer" aria-live="polite">
      <span id="timer-value">0.0</span><span class="unit">s</span>
    </div>

    <div class="jar-wrap" id="jarWrap">
      <button class="jar" id="jar"
              aria-label="Tap to start recording"
              aria-pressed="false"></button>
    </div>

    <div class="caption" id="caption">Tap the jar when you're ready.</div>

    <div class="tray" role="region" aria-label="Recording preview">
      <audio id="preview" controls></audio>
      <div class="tray-row">
        <span class="meta" id="meta"></span>
        <div style="display:flex; gap:.4rem; align-items:center;">
          <button class="reset" id="reset" type="button">Record again</button>
          <a class="download" id="download" download="memoryjar-message.wav">Save WAV</a>
          <button class="send" id="send" type="button">Send to jar</button>
        </div>
      </div>
      <span class="meta" id="sendStatus" aria-live="polite"></span>
    </div>
  </main>

  <footer>16 kHz · 16-bit mono WAV · max 60s</footer>

<script>
const ui = {
  body: document.body,
  jar: document.getElementById('jar'),
  jarWrap: document.getElementById('jarWrap'),
  timer: document.getElementById('timer-value'),
  caption: document.getElementById('caption'),
  preview: document.getElementById('preview'),
  download: document.getElementById('download'),
  meta: document.getElementById('meta'),
  reset: document.getElementById('reset'),
  send: document.getElementById('send'),
  sendStatus: document.getElementById('sendStatus'),
  error: document.getElementById('error'),
};

const MAX_SECONDS = 60;
const TARGET_RATE = 16000;

const SUPABASE_URL = 'https://tpeuavqzqnmjkaxayhxi.supabase.co';
const SUPABASE_KEY = 'sb_publishable_58ih-EwwcX806ZpqOAd69g_KBNOunqI';
const SUPABASE_BUCKET = 'messages';
const FIREBASE_URL = 'https://memoryjar-ddbd0-default-rtdb.asia-southeast1.firebasedatabase.app';

let wavBlob = null;

let audioCtx, mediaStream, sourceNode, workletNode;
let chunks = [];
let sampleRate = 0;
let startTs = 0;
let timerId = 0;
let smoothLevel = 0;     // exponentially smoothed peak for orb glow
let rafId = 0;

const workletSrc = `
class RecorderProcessor extends AudioWorkletProcessor {
  process(inputs) {
    const input = inputs[0];
    if (input && input[0]) {
      const ch0 = input[0];
      const ch1 = input[1];
      const out = new Float32Array(ch0.length);
      if (ch1) {
        for (let i = 0; i < ch0.length; i++) out[i] = (ch0[i] + ch1[i]) * 0.5;
      } else {
        out.set(ch0);
      }
      this.port.postMessage(out, [out.buffer]);
    }
    return true;
  }
}
registerProcessor('recorder-processor', RecorderProcessor);
`;
const workletURL = URL.createObjectURL(new Blob([workletSrc], { type: 'application/javascript' }));

function setState(state) {
  ui.body.dataset.state = state;
  ui.body.dataset.error = 'false';
  if (state === 'idle') {
    ui.caption.textContent = "Tap the jar when you're ready.";
    ui.jar.setAttribute('aria-label', 'Tap to start recording');
    ui.jar.setAttribute('aria-pressed', 'false');
  } else if (state === 'recording') {
    ui.caption.textContent = 'Listening…';
    ui.jar.setAttribute('aria-label', 'Tap to stop recording');
    ui.jar.setAttribute('aria-pressed', 'true');
  } else if (state === 'sealed') {
    ui.caption.textContent = 'Sealed. Listen back below.';
    ui.jar.setAttribute('aria-label', 'Recording sealed. Tap Record again to start over.');
    ui.jar.setAttribute('aria-pressed', 'false');
  }
}

function showError(msg) {
  ui.body.dataset.error = 'true';
  ui.error.textContent = msg;
}

async function startRecording() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, channelCount: 1 },
    });
  } catch (err) {
    showError("Couldn't access the microphone — please check browser permissions.");
    return;
  }

  audioCtx = new AudioContext();
  sampleRate = audioCtx.sampleRate;
  await audioCtx.audioWorklet.addModule(workletURL);

  sourceNode = audioCtx.createMediaStreamSource(mediaStream);
  workletNode = new AudioWorkletNode(audioCtx, 'recorder-processor');

  chunks = [];
  smoothLevel = 0;
  workletNode.port.onmessage = (e) => {
    const block = e.data;
    chunks.push(block);
    let peak = 0;
    for (let i = 0; i < block.length; i++) {
      const v = Math.abs(block[i]);
      if (v > peak) peak = v;
    }
    // Smooth so the glow doesn't jitter; faster attack, slower release.
    const target = Math.min(1, peak * 2.2);
    const k = target > smoothLevel ? 0.45 : 0.12;
    smoothLevel = smoothLevel + (target - smoothLevel) * k;
  };

  sourceNode.connect(workletNode);
  const sink = audioCtx.createGain();
  sink.gain.value = 0;
  workletNode.connect(sink).connect(audioCtx.destination);

  setState('recording');
  startTs = performance.now();

  // Tick UI on rAF for smooth glow + timer
  const tick = () => {
    const elapsed = (performance.now() - startTs) / 1000;
    ui.timer.textContent = elapsed.toFixed(1);
    ui.jarWrap.style.setProperty('--level', smoothLevel.toFixed(3));
    if (elapsed >= MAX_SECONDS) {
      stopRecording();
      return;
    }
    rafId = requestAnimationFrame(tick);
  };
  rafId = requestAnimationFrame(tick);
}

async function stopRecording() {
  cancelAnimationFrame(rafId);
  ui.jarWrap.style.setProperty('--level', 0);

  if (!workletNode) return;
  workletNode.port.onmessage = null;
  workletNode.disconnect();
  sourceNode.disconnect();
  mediaStream.getTracks().forEach(t => t.stop());
  await audioCtx.close();
  workletNode = null;

  const raw = flatten(chunks);
  const samples = await resampleTo(raw, sampleRate, TARGET_RATE);
  const wav = encodeWAV(samples, TARGET_RATE);
  const blob = new Blob([wav], { type: 'audio/wav' });
  const url = URL.createObjectURL(blob);

  wavBlob = blob;

  ui.preview.src = url;
  ui.download.href = url;
  ui.send.disabled = false;
  ui.send.textContent = 'Send to jar';
  ui.sendStatus.textContent = '';
  ui.body.dataset.send = 'ready';

  const seconds = samples.length / TARGET_RATE;
  const kb = (blob.size / 1024).toFixed(1);
  ui.meta.textContent = `${seconds.toFixed(2)}s · ${TARGET_RATE} Hz · 16-bit mono · ${kb} KB`;
  ui.timer.textContent = seconds.toFixed(1);

  setState('sealed');
}

async function sendMessage() {
  if (!wavBlob) return;
  ui.send.disabled = true;
  ui.body.dataset.send = 'sending';
  ui.send.textContent = 'Sending…';
  ui.sendStatus.textContent = 'Uploading audio…';

  const filename = `msg-${Date.now()}-${Math.random().toString(36).slice(2, 8)}.wav`;
  const uploadUrl = `${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/${filename}`;
  const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${filename}`;

  try {
    const upRes = await fetch(uploadUrl, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'apikey': SUPABASE_KEY,
        'Content-Type': 'audio/wav',
        'x-upsert': 'true',
      },
      body: wavBlob,
    });
    if (!upRes.ok) {
      const txt = await upRes.text().catch(() => '');
      throw new Error(`Supabase upload failed (${upRes.status}): ${txt || upRes.statusText}`);
    }

    ui.sendStatus.textContent = 'Notifying jar…';

    const fbRes = await fetch(`${FIREBASE_URL}/.json`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messageUrl: publicUrl, newMessage: true }),
    });
    if (!fbRes.ok) {
      const txt = await fbRes.text().catch(() => '');
      throw new Error(`Firebase update failed (${fbRes.status}): ${txt || fbRes.statusText}`);
    }

    ui.body.dataset.send = 'sent';
    ui.send.textContent = 'Delivered ✓';
    ui.sendStatus.textContent = 'Sent to the jar. The LED should light up shortly.';
  } catch (err) {
    ui.body.dataset.send = 'ready';
    ui.send.disabled = false;
    ui.send.textContent = 'Try again';
    ui.sendStatus.textContent = '';
    showError(err.message || String(err));
  }
}

function resetAll() {
  if (ui.preview.src) URL.revokeObjectURL(ui.preview.src);
  ui.preview.removeAttribute('src');
  ui.download.removeAttribute('href');
  ui.meta.textContent = '';
  ui.timer.textContent = '0.0';
  setState('idle');
}

ui.jar.addEventListener('click', () => {
  const s = ui.body.dataset.state;
  if (s === 'idle') startRecording();
  else if (s === 'recording') stopRecording();
  else if (s === 'sealed') resetAll();
});
ui.reset.addEventListener('click', resetAll);
ui.send.addEventListener('click', sendMessage);

async function resampleTo(samples, fromRate, toRate) {
  if (fromRate === toRate) return samples;
  const outLength = Math.ceil(samples.length * toRate / fromRate);
  const offline = new OfflineAudioContext(1, outLength, toRate);
  const buf = offline.createBuffer(1, samples.length, fromRate);
  buf.copyToChannel(samples, 0);
  const src = offline.createBufferSource();
  src.buffer = buf;
  src.connect(offline.destination);
  src.start();
  const rendered = await offline.startRendering();
  return rendered.getChannelData(0);
}

function flatten(arrs) {
  let total = 0;
  for (const a of arrs) total += a.length;
  const out = new Float32Array(total);
  let offset = 0;
  for (const a of arrs) { out.set(a, offset); offset += a.length; }
  return out;
}

// PCM16 mono WAV. Header = 44 bytes; see http://soundfile.sapp.org/doc/WaveFormat/
function encodeWAV(samples, sampleRate) {
  const bytesPerSample = 2;
  const numChannels = 1;
  const dataSize = samples.length * bytesPerSample;
  const buffer = new ArrayBuffer(44 + dataSize);
  const view = new DataView(buffer);

  writeStr(view, 0, 'RIFF');
  view.setUint32(4, 36 + dataSize, true);
  writeStr(view, 8, 'WAVE');
  writeStr(view, 12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * numChannels * bytesPerSample, true);
  view.setUint16(32, numChannels * bytesPerSample, true);
  view.setUint16(34, 16, true);
  writeStr(view, 36, 'data');
  view.setUint32(40, dataSize, true);

  let offset = 44;
  for (let i = 0; i < samples.length; i++, offset += 2) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7fff, true);
  }
  return view;
}

function writeStr(view, offset, s) {
  for (let i = 0; i < s.length; i++) view.setUint8(offset + i, s.charCodeAt(i));
}
</script>
</body>
</html>
